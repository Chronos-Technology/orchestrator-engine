name: Build and cache Docker image to ghcr.io

# BiVelio Orchestrator — construye la imagen Docker del motor PaperClip y la cachea
# en ghcr.io/chronos-technology/orchestrator-engine para que el VPS Velio pueda
# pullarla con pin de versión exacto (NO :latest en producción).
#
# Tags emitidos:
#   - sha-<7chars>      (cada build, trazable)
#   - master            (rolling, NO usar en docker-compose prod)
#   - v<calendar>       (release manual)

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag manual de release (ej: v0.1.0-bivelio)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="ghcr.io/chronos-technology/orchestrator-engine:sha-${SHORT_SHA}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="${TAGS},ghcr.io/chronos-technology/orchestrator-engine:master"
          fi
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="${TAGS},ghcr.io/chronos-technology/orchestrator-engine:${{ github.ref_name }}"
          fi
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},ghcr.io/chronos-technology/orchestrator-engine:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Will push tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
